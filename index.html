<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aye Hotel - Luxury Booking & Property Management Ecosystem</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        playfair: ['"Playfair Display"', 'serif'],
                        urbanist: ['"Urbanist"', 'sans-serif'],
                    },
                    colors: {
                        luxury: {
                            gold: '#D4AF37',
                            'gold-light': '#FDE68A',
                            dark: '#020617',
                            slate: '#0F172A',
                            card: '#1E293B',
                            light: '#F8FAFC',
                            muted: '#CBD5E1',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-luxury-dark text-luxury-light font-urbanist selection:bg-luxury-gold selection:text-luxury-dark">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Custom state storage defaults for simulating the backend DB
        const DEFAULT_ROOMS = [
            { id: 101, name: "Sovereign Penthouse", type: "Suite", price: 24500, status: "Clean", image: "https://images.unsplash.com/photo-1618773928121-c32242e63f39?auto=format&fit=crop&q=80&w=800", amenities: ["Private Pool", "24/7 Butler", "Helipad Access", "Champagne Bar"] },
            { id: 102, name: "Presidential Skyline Suite", type: "Suite", price: 18000, status: "Clean", image: "https://images.unsplash.com/photo-1590490360182-c33d57733427?auto=format&fit=crop&q=80&w=800", amenities: ["Panoramic View", "Spa Bathroom", "Wine Cellar", "Private Chef"] },
            { id: 201, name: "Imperial King Oasis", type: "Deluxe", price: 12500, status: "Occupied", image: "https://images.unsplash.com/photo-1566665797739-1674de7a421a?auto=format&fit=crop&q=80&w=800", amenities: ["King Bed", "Ocean View Balcony", "Smart Room Automation"] },
            { id: 202, name: "Executive Royal Suite", type: "Deluxe", price: 9500, status: "Dirty", image: "https://images.unsplash.com/photo-1591088398332-8a7791972843?auto=format&fit=crop&q=80&w=800", amenities: ["Plunge Pool", "Living Lounge", "High-speed Wi-Fi"] },
            { id: 301, name: "Emerald Garden Room", type: "Standard", price: 6000, status: "Clean", image: "https://images.unsplash.com/photo-1505691938895-1758d7feb511?auto=format&fit=crop&q=80&w=800", amenities: ["Queen Bed", "Botanical Views", "Espresso Machine"] },
            { id: 302, name: "Sapphire Courtyard Premium", type: "Standard", price: 5500, status: "Clean", image: "https://images.unsplash.com/photo-1582719478250-c89cae4db85b?auto=format&fit=crop&q=80&w=800", amenities: ["Queen Bed", "Courtyard Access", "Premium Sound System"] }
        ];

        const DEFAULT_BOOKINGS = [
            { id: "AYE-74920", guestName: "Mekdelawit Asrat", roomId: 201, checkIn: "2026-05-20", checkOut: "2026-05-25", amount: 62500, paymentStatus: "Paid" },
            { id: "AYE-38102", guestName: "Abel Jemaneh", roomId: 102, checkIn: "2026-05-18", checkOut: "2026-05-21", amount: 54000, paymentStatus: "Paid" }
        ];

        function App() {
            // General Navigation
            const [view, setView] = useState('guest-home'); // 'guest-home' | 'rooms' | 'concierge' | 'reception-dashboard'
            
            // Database Simulation State
            const [rooms, setRooms] = useState(() => {
                const saved = localStorage.getItem('aye_rooms');
                return saved ? JSON.parse(saved) : DEFAULT_ROOMS;
            });
            const [bookings, setBookings] = useState(() => {
                const saved = localStorage.getItem('aye_bookings');
                return saved ? JSON.parse(saved) : DEFAULT_BOOKINGS;
            });

            // Booking Modal State
            const [selectedRoom, setSelectedRoom] = useState(null);
            const [bookingName, setBookingName] = useState('');
            const [bookingCheckIn, setBookingCheckIn] = useState('');
            const [bookingCheckOut, setBookingCheckOut] = useState('');
            const [invoiceResult, setInvoiceResult] = useState(null);

            // AI Concierge Chat State
            const [chatMessages, setChatMessages] = useState([
                { sender: 'ai', text: "Welcome to Aye Hotel's Luxury Virtual Assistant. I can help recommend our premium suites, estimate pricing, or answer details about our operational amenities. What may I assist you with today?" }
            ]);
            const [chatInput, setChatInput] = useState('');
            const [aiLoading, setAiLoading] = useState(false);

            // Synchronize State
            useEffect(() => {
                localStorage.setItem('aye_rooms', JSON.stringify(rooms));
            }, [rooms]);

            useEffect(() => {
                localStorage.setItem('aye_bookings', JSON.stringify(bookings));
            }, [bookings]);

            useEffect(() => {
                // Initialize Lucide icons on render
                lucide.createIcons();
            }, [view, selectedRoom, invoiceResult, chatMessages]);

            // Formulate standard notification model UI
            const [notification, setNotification] = useState(null);
            const showNotification = (message, type = 'success') => {
                setNotification({ message, type });
                setTimeout(() => setNotification(null), 4000);
            };

            // Booking Handler
            const handleInitiateBooking = (room) => {
                if (room.status === 'Occupied') {
                    showNotification("This room is currently occupied by another VIP guest.", "error");
                    return;
                }
                setSelectedRoom(room);
                setInvoiceResult(null);
            };

            const calculateInvoice = () => {
                if (!bookingCheckIn || !bookingCheckOut || !bookingName) {
                    showNotification("Please fill out all required fields to generate an invoice.", "error");
                    return;
                }
                const date1 = new Date(bookingCheckIn);
                const date2 = new Date(bookingCheckOut);
                const diffTime = Math.abs(date2 - date1);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                
                if (isNaN(diffDays) || diffDays <= 0) {
                    showNotification("Invalid dates selected. Checkout must occur after check-in.", "error");
                    return;
                }

                const total = diffDays * selectedRoom.price;
                setInvoiceResult({
                    days: diffDays,
                    total: total,
                    guest: bookingName,
                    checkIn: bookingCheckIn,
                    checkOut: bookingCheckOut
                });
            };

            const confirmBooking = () => {
                const newBookingId = "AYE-" + Math.floor(10000 + Math.random() * 90000);
                const newBooking = {
                    id: newBookingId,
                    guestName: invoiceResult.guest,
                    roomId: selectedRoom.id,
                    checkIn: invoiceResult.checkIn,
                    checkOut: invoiceResult.checkOut,
                    amount: invoiceResult.total,
                    paymentStatus: "Paid"
                };

                // Update simulation schemas
                setBookings([newBooking, ...bookings]);
                setRooms(rooms.map(r => r.id === selectedRoom.id ? { ...r, status: 'Occupied' } : r));

                // Clear & notify
                setSelectedRoom(null);
                setInvoiceResult(null);
                setBookingName('');
                setBookingCheckIn('');
                setBookingCheckOut('');
                showNotification(`Reservation ${newBookingId} successfully confirmed & paid! Room state: Occupied.`, "success");
            };

            // AI Concierge Chat Execution (Gemini API Integration)
            const handleSendChatMessage = async (e) => {
                e.preventDefault();
                if (!chatInput.trim()) return;

                const userText = chatInput;
                setChatMessages(prev => [...prev, { sender: 'user', text: userText }]);
                setChatInput('');
                setAiLoading(true);

                // Build context instructions based on current actual room availability state
                const availableRoomsList = rooms.filter(r => r.status === 'Clean')
                    .map(r => `${r.name} (${r.type}) priced at ${r.price} ETB per night. Amenities: ${r.amenities.join(', ')}`)
                    .join('; ');

                const systemInstruction = `
                    You are the automated AI luxury concierge of Aye Hotel.
                    Your goal is to assist guests in choosing and scheduling rooms, sharing detailed room amenities, and addressing standard customer inquiries in a professional, courteous, and sophisticated manner.
                    Currently available rooms right now in our database system are: [ ${availableRoomsList} ].
                    If the guest asks about pricing or recommendations, pitch these rooms enthusiastically.
                    Keep responses structured, engaging, and professional. Use ETB for currency references.
                `;

                // Exponential backoff API call helper
                const callGemini = async (query, retries = 5, delay = 1000) => {
                    const apiKey = ""; // Left empty for dynamic runtime injection
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                    const payload = {
                        contents: [{ parts: [{ text: query }] }],
                        systemInstruction: { parts: [{ text: systemInstruction }] }
                    };

                    try {
                        const response = await fetch(url, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(payload)
                        });
                        if (!response.ok) throw new Error(`HTTP Error Status: ${response.status}`);
                        const data = await response.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text || "I am processing your transaction request. Please try again.";
                    } catch (error) {
                        if (retries > 0) {
                            await new Promise(res => setTimeout(res, delay));
                            return callGemini(query, retries - 1, delay * 2);
                        }
                        throw error;
                    }
                };

                try {
                    const reply = await callGemini(userText);
                    setChatMessages(prev => [...prev, { sender: 'ai', text: reply }]);
                } catch (err) {
                    console.error(err);
                    setChatMessages(prev => [...prev, { sender: 'ai', text: "I experienced an architecture connection error. Rest assured your request is being routed manually to our front desk." }]);
                } finally {
                    setAiLoading(false);
                }
            };

            // Admin Actions
            const toggleRoomStatus = (roomId, currentStatus) => {
                const statuses = ["Clean", "Occupied", "Dirty"];
                const nextStatus = statuses[(statuses.indexOf(currentStatus) + 1) % statuses.length];
                setRooms(rooms.map(r => r.id === roomId ? { ...r, status: nextStatus } : r));
                showNotification(`Room ${roomId} status changed to ${nextStatus}.`, "success");
            };

            return (
                <div class="min-h-screen flex flex-col justify-between">
                    {/* Header Navbar */}
                    <header class="border-b border-luxury-gold/20 bg-luxury-dark/95 sticky top-0 z-50 backdrop-blur-md px-6 py-4">
                        <div class="max-w-7xl mx-auto flex justify-between items-center">
                            <div class="flex items-center gap-3 cursor-pointer" onClick={() => setView('guest-home')}>
                                <span class="text-luxury-gold text-2xl font-playfair font-bold tracking-widest">AYE HOTEL</span>
                            </div>
                            <nav class="flex items-center gap-6">
                                <button onClick={() => setView('guest-home')} class={`font-medium tracking-wide transition-colors ${view === 'guest-home' ? 'text-luxury-gold' : 'text-luxury-muted hover:text-white'}`}>Home</button>
                                <button onClick={() => setView('rooms')} class={`font-medium tracking-wide transition-colors ${view === 'rooms' ? 'text-luxury-gold' : 'text-luxury-muted hover:text-white'}`}>Luxury Suites</button>
                                <button onClick={() => setView('concierge')} class={`font-medium tracking-wide transition-colors ${view === 'concierge' ? 'text-luxury-gold' : 'text-luxury-muted hover:text-white'}`}>AI Concierge</button>
                                <button onClick={() => setView('reception-dashboard')} class="flex items-center gap-2 border border-luxury-gold/40 text-luxury-gold hover:bg-luxury-gold hover:text-luxury-dark transition-all px-4 py-2 rounded-lg font-semibold text-sm">
                                    <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Staff Portal
                                </button>
                            </nav>
                        </div>
                    </header>

                    {/* Notification Alert Box */}
                    {notification && (
                        <div class="fixed top-24 right-6 z-50 flex items-center gap-3 px-5 py-4 rounded-xl shadow-2xl border bg-luxury-card animate-bounce">
                            <i data-lucide={notification.type === 'success' ? 'check-circle' : 'alert-triangle'} class={notification.type === 'success' ? 'text-emerald-400' : 'text-red-400'}></i>
                            <p class="font-medium text-sm text-luxury-light">{notification.message}</p>
                        </div>
                    )}

                    {/* Main Content Area */}
                    <main class="flex-grow max-w-7xl w-full mx-auto px-6 py-10">
                        {view === 'guest-home' && (
                            <div class="space-y-16">
                                {/* Hero Presentation Display */}
                                <div class="relative rounded-2xl overflow-hidden min-h-[500px] flex items-center bg-cover bg-center" style={{ backgroundImage: "linear-gradient(to right, rgba(2, 6, 23, 0.9) 50%, rgba(2, 6, 23, 0.4)), url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&q=80&w=1200')" }}>
                                    <div class="p-10 max-w-2xl space-y-6">
                                        <div class="inline-block border border-luxury-gold/40 text-luxury-gold text-xs font-bold tracking-widest px-3 py-1 uppercase rounded-full">Imperial Living Ecosystem</div>
                                        <h1 class="text-5xl md:text-6xl font-playfair font-bold text-white leading-tight">Sophistication Defined</h1>
                                        <p class="text-luxury-muted text-lg">Indulge in an automated boutique residency featuring dedicated AI guest assistants, curated private events, and state-of-the-art suite controls.</p>
                                        <div class="flex flex-wrap gap-4 pt-4">
                                            <button onClick={() => setView('rooms')} class="bg-luxury-gold hover:bg-luxury-gold-light text-luxury-dark font-bold px-8 py-3.5 rounded-lg transition-all shadow-lg flex items-center gap-2">
                                                Book Resident Suites <i data-lucide="arrow-right" class="w-4 h-4"></i>
                                            </button>
                                            <button onClick={() => setView('concierge')} class="border border-white/20 hover:border-luxury-gold text-white hover:text-luxury-gold font-bold px-8 py-3.5 rounded-lg transition-all flex items-center gap-2 bg-luxury-dark/40">
                                                Consult AI Butler <i data-lucide="sparkles" class="w-4 h-4"></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                {/* Curated Amenities Cards */}
                                <div class="space-y-6">
                                    <div class="text-center">
                                        <h2 class="text-3xl font-playfair font-bold text-luxury-gold">Uncompromised Luxury Services</h2>
                                        <p class="text-luxury-muted">Tailored with high technical alignment for unparalleled residential efficiency.</p>
                                    </div>
                                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                                        <div class="bg-luxury-card p-8 rounded-xl border border-white/5 space-y-4">
                                            <div class="w-12 h-12 rounded-lg bg-luxury-gold/10 flex items-center justify-center text-luxury-gold"><i data-lucide="sparkles" class="w-6 h-6"></i></div>
                                            <h3 class="text-xl font-bold font-playfair">Generative AI Concierge</h3>
                                            <p class="text-luxury-muted text-sm">24/7 autonomous support agent to recommend matching luxury suites based on live inventories and process instant requests.</p>
                                        </div>
                                        <div class="bg-luxury-card p-8 rounded-xl border border-white/5 space-y-4">
                                            <div class="w-12 h-12 rounded-lg bg-luxury-gold/10 flex items-center justify-center text-luxury-gold"><i data-lucide="shield-check" class="w-6 h-6"></i></div>
                                            <h3 class="text-xl font-bold font-playfair">ACID Booking Architecture</h3>
                                            <p class="text-luxury-muted text-sm">Advanced system safeguards protecting transaction integrity, preventing conflicting scheduling overlaps.</p>
                                        </div>
                                        <div class="bg-luxury-card p-8 rounded-xl border border-white/5 space-y-4">
                                            <div class="w-12 h-12 rounded-lg bg-luxury-gold/10 flex items-center justify-center text-luxury-gold"><i data-lucide="smartphone" class="w-6 h-6"></i></div>
                                            <h3 class="text-xl font-bold font-playfair">Fluid Mobile Integration</h3>
                                            <p class="text-luxury-muted text-sm">Seamless dashboard response engines for travelers looking to lock reservations across any portable web browser.</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'rooms' && (
                            <div class="space-y-10">
                                <div class="flex justify-between items-end border-b border-white/5 pb-6">
                                    <div>
                                        <h2 class="text-4xl font-playfair font-bold text-luxury-gold">Luxury Resident Suites</h2>
                                        <p class="text-luxury-muted">Browse our curations. Room states update in real-time inside the transactional system database.</p>
                                    </div>
                                </div>

                                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                                    {rooms.map(room => (
                                        <div key={room.id} class="bg-luxury-card rounded-xl overflow-hidden border border-white/5 flex flex-col justify-between">
                                            <div class="relative h-64">
                                                <img src={room.image} alt={room.name} class="w-full h-full object-cover" />
                                                <div class="absolute top-4 right-4 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider bg-luxury-dark/80 text-luxury-gold">
                                                    {room.type}
                                                </div>
                                                <div class={`absolute bottom-4 left-4 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wide flex items-center gap-1.5 ${room.status === 'Clean' ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' : room.status === 'Occupied' ? 'bg-amber-500/20 text-amber-400 border border-amber-500/30' : 'bg-red-500/20 text-red-400 border border-red-500/30'}`}>
                                                    <span class={`w-2 h-2 rounded-full ${room.status === 'Clean' ? 'bg-emerald-400' : room.status === 'Occupied' ? 'bg-amber-400' : 'bg-red-400'}`}></span>
                                                    {room.status}
                                                </div>
                                            </div>
                                            <div class="p-6 flex-grow flex flex-col justify-between">
                                                <div class="space-y-4">
                                                    <div>
                                                        <h3 class="text-2xl font-bold font-playfair text-white">{room.name}</h3>
                                                        <p class="text-xs text-luxury-muted mt-1">Room Reference: System-Suite {room.id}</p>
                                                    </div>
                                                    <div class="flex flex-wrap gap-1.5">
                                                        {room.amenities.map((a, i) => (
                                                            <span key={i} class="text-xs px-2.5 py-1 bg-white/5 text-luxury-muted rounded-md">{a}</span>
                                                        ))}
                                                    </div>
                                                </div>
                                                <div class="mt-6 pt-6 border-t border-white/5 flex items-center justify-between">
                                                    <div>
                                                        <span class="text-xs text-luxury-muted block">Luxury Night Rate</span>
                                                        <span class="text-2xl font-bold text-luxury-gold">{room.price.toLocaleString()} <span class="text-xs font-normal">ETB</span></span>
                                                    </div>
                                                    <button onClick={() => handleInitiateBooking(room)} class="bg-luxury-gold hover:bg-luxury-gold-light text-luxury-dark font-bold px-5 py-2.5 rounded-lg transition-all text-sm">
                                                        Reserve Suite
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'concierge' && (
                            <div class="max-w-4xl mx-auto space-y-6">
                                <div class="border-b border-white/5 pb-6">
                                    <h2 class="text-4xl font-playfair font-bold text-luxury-gold">AI Concierge Desk</h2>
                                    <p class="text-luxury-muted">A fully autonomous interface to consult and book properties in real-time. Powering interactive inquiries about dining, spa times, and premium upgrades.</p>
                                </div>

                                <div class="bg-luxury-card rounded-xl border border-white/5 flex flex-col h-[550px]">
                                    {/* Chat Display Pane */}
                                    <div class="flex-grow overflow-y-auto p-6 space-y-4">
                                        {chatMessages.map((msg, i) => (
                                            <div key={i} class={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                                <div class={`max-w-[80%] rounded-xl p-4 space-y-2 ${msg.sender === 'user' ? 'bg-luxury-gold text-luxury-dark rounded-tr-none' : 'bg-luxury-slate border border-white/5 text-luxury-light rounded-tl-none'}`}>
                                                    <div class="flex items-center gap-2 text-xs font-bold uppercase tracking-wider opacity-60">
                                                        <i data-lucide={msg.sender === 'user' ? 'user' : 'sparkles'} class="w-3.5 h-3.5"></i>
                                                        {msg.sender === 'user' ? 'Guest' : 'Aye Virtual Concierge'}
                                                    </div>
                                                    <p class="text-sm leading-relaxed whitespace-pre-line">{msg.text}</p>
                                                </div>
                                            </div>
                                        ))}
                                        {aiLoading && (
                                            <div class="flex justify-start">
                                                <div class="bg-luxury-slate border border-white/5 text-luxury-light rounded-xl rounded-tl-none p-4 flex items-center gap-3">
                                                    <div class="w-2.5 h-2.5 rounded-full bg-luxury-gold animate-ping"></div>
                                                    <span class="text-xs font-bold tracking-wider uppercase opacity-60 animate-pulse">Consulting reservation ledger...</span>
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    {/* Chat Input Console */}
                                    <form onSubmit={handleSendChatMessage} class="p-4 border-t border-white/5 bg-luxury-slate/50 flex gap-3 rounded-b-xl">
                                        <input 
                                            type="text" 
                                            value={chatInput} 
                                            onChange={(e) => setChatInput(e.target.value)}
                                            placeholder="Ask about room advice, rates, pool times or breakfast inclusions..." 
                                            class="flex-grow bg-luxury-dark border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-luxury-gold text-luxury-light"
                                        />
                                        <button type="submit" class="bg-luxury-gold hover:bg-luxury-gold-light text-luxury-dark font-bold px-6 py-3 rounded-lg transition-all flex items-center justify-center">
                                            <i data-lucide="send" class="w-4 h-4"></i>
                                        </button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {view === 'reception-dashboard' && (
                            <div class="space-y-10 animate-fade-in">
                                <div class="flex flex-col md:flex-row md:items-end justify-between border-b border-white/5 pb-6 gap-4">
                                    <div>
                                        <h2 class="text-4xl font-playfair font-bold text-luxury-gold">Unified Receptionist Console</h2>
                                        <p class="text-luxury-muted">Active management interface to control status matrices, clean vectors, and verify financial ledgers.</p>
                                    </div>
                                    <div class="flex items-center gap-4">
                                        <div class="bg-luxury-card px-4 py-2 rounded-lg border border-white/5">
                                            <span class="text-xs text-luxury-muted block">System Security Clearance</span>
                                            <span class="text-sm font-bold text-emerald-400">Authorized: Mekdelawit Asrat</span>
                                        </div>
                                    </div>
                                </div>

                                {/* Summary Stats */}
                                <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                                    <div class="bg-luxury-card p-6 rounded-xl border border-white/5">
                                        <div class="flex justify-between items-start">
                                            <span class="text-sm text-luxury-muted font-bold tracking-wide uppercase">Total Invoiced</span>
                                            <i data-lucide="banknote" class="text-luxury-gold w-5 h-5"></i>
                                        </div>
                                        <h4 class="text-3xl font-bold font-playfair mt-4">
                                            {bookings.reduce((acc, b) => acc + b.amount, 0).toLocaleString()} <span class="text-sm font-normal text-luxury-muted">ETB</span>
                                        </h4>
                                    </div>
                                    <div class="bg-luxury-card p-6 rounded-xl border border-white/5">
                                        <div class="flex justify-between items-start">
                                            <span class="text-sm text-luxury-muted font-bold tracking-wide uppercase">Active Bookings</span>
                                            <i data-lucide="calendar-check" class="text-luxury-gold w-5 h-5"></i>
                                        </div>
                                        <h4 class="text-3xl font-bold font-playfair mt-4">{bookings.length}</h4>
                                    </div>
                                    <div class="bg-luxury-card p-6 rounded-xl border border-white/5">
                                        <div class="flex justify-between items-start">
                                            <span class="text-sm text-luxury-muted font-bold tracking-wide uppercase">Rooms Available</span>
                                            <i data-lucide="check" class="text-luxury-gold w-5 h-5"></i>
                                        </div>
                                        <h4 class="text-3xl font-bold font-playfair mt-4">
                                            {rooms.filter(r => r.status === 'Clean').length} / {rooms.length}
                                        </h4>
                                    </div>
                                    <div class="bg-luxury-card p-6 rounded-xl border border-white/5">
                                        <div class="flex justify-between items-start">
                                            <span class="text-sm text-luxury-muted font-bold tracking-wide uppercase">Dirty Vector Count</span>
                                            <i data-lucide="brush" class="text-luxury-gold w-5 h-5"></i>
                                        </div>
                                        <h4 class="text-3xl font-bold font-playfair mt-4 text-rose-400">
                                            {rooms.filter(r => r.status === 'Dirty').length}
                                        </h4>
                                    </div>
                                </div>

                                {/* Room Matrix and Booking lists */}
                                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    {/* Room Operations Matrix */}
                                    <div class="lg:col-span-2 space-y-6">
                                        <h3 class="text-2xl font-playfair font-bold text-white">Physical Room State Matrix</h3>
                                        <div class="bg-luxury-card rounded-xl border border-white/5 overflow-hidden">
                                            <table class="w-full text-left">
                                                <thead>
                                                    <tr class="bg-luxury-slate border-b border-white/5 text-xs font-bold uppercase tracking-wider text-luxury-gold">
                                                        <th class="p-4">Suite #</th>
                                                        <th class="p-4">Name</th>
                                                        <th class="p-4">Rate</th>
                                                        <th class="p-4">Status Map</th>
                                                        <th class="p-4 text-right">Actions</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {rooms.map(room => (
                                                        <tr key={room.id} class="border-b border-white/5 hover:bg-white/5 transition-all">
                                                            <td class="p-4 font-mono text-sm">{room.id}</td>
                                                            <td class="p-4 font-semibold text-white">{room.name}</td>
                                                            <td class="p-4 font-mono text-sm">{room.price.toLocaleString()} ETB</td>
                                                            <td class="p-4">
                                                                <span class={`px-2.5 py-1 rounded-full text-xs font-bold uppercase tracking-wide flex items-center gap-1.5 w-fit ${room.status === 'Clean' ? 'bg-emerald-500/20 text-emerald-400' : room.status === 'Occupied' ? 'bg-amber-500/20 text-amber-400' : 'bg-red-500/20 text-red-400'}`}>
                                                                    <span class={`w-1.5 h-1.5 rounded-full ${room.status === 'Clean' ? 'bg-emerald-400' : room.status === 'Occupied' ? 'bg-amber-400' : 'bg-red-400'}`}></span>
                                                                    {room.status}
                                                                </span>
                                                            </td>
                                                            <td class="p-4 text-right">
                                                                <button onClick={() => toggleRoomStatus(room.id, room.status)} class="text-xs font-bold border border-white/10 hover:border-luxury-gold hover:text-luxury-gold rounded px-3 py-1.5 transition-all">
                                                                    Toggle State
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>

                                    {/* Recent Financial Ledger */}
                                    <div class="space-y-6">
                                        <h3 class="text-2xl font-playfair font-bold text-white">Transactional Ledger</h3>
                                        <div class="bg-luxury-card rounded-xl border border-white/5 p-6 space-y-4">
                                            {bookings.map(booking => (
                                                <div key={booking.id} class="p-4 rounded-lg bg-luxury-slate border border-white/5 space-y-2">
                                                    <div class="flex justify-between items-center text-xs">
                                                        <span class="font-mono text-luxury-gold font-bold">{booking.id}</span>
                                                        <span class="text-emerald-400 bg-emerald-500/10 px-2 py-0.5 rounded-full font-bold uppercase tracking-wider text-[10px]">Settled</span>
                                                    </div>
                                                    <h5 class="font-semibold text-white text-sm">{booking.guestName}</h5>
                                                    <div class="flex justify-between text-xs text-luxury-muted">
                                                        <span>Suite ID: {booking.roomId}</span>
                                                        <span>{booking.amount.toLocaleString()} ETB</span>
                                                    </div>
                                                    <div class="text-[10px] text-luxury-muted/70 font-mono">
                                                        Period: {booking.checkIn} to {booking.checkOut}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Booking Form Overlay Modal */}
                    {selectedRoom && (
                        <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-luxury-dark/90 backdrop-blur-sm">
                            <div class="bg-luxury-card rounded-2xl border border-luxury-gold/30 p-8 max-w-lg w-full space-y-6 shadow-2xl animate-scale-up">
                                <div class="flex justify-between items-start border-b border-white/5 pb-4">
                                    <div>
                                        <h3 class="text-2xl font-playfair font-bold text-luxury-gold">VIP Registration Drawer</h3>
                                        <p class="text-xs text-luxury-muted mt-1">Sovereign Booking Ledger Allocation Suite {selectedRoom.id}</p>
                                    </div>
                                    <button onClick={() => setSelectedRoom(null)} class="text-luxury-muted hover:text-white p-1">
                                        <i data-lucide="x" class="w-6 h-6"></i>
                                    </button>
                                </div>

                                <div class="space-y-4">
                                    <div class="space-y-1.5">
                                        <label class="text-xs font-bold uppercase tracking-wider text-luxury-muted block">Guest Holder Name</label>
                                        <input 
                                            type="text" 
                                            value={bookingName}
                                            onChange={(e) => setBookingName(e.target.value)}
                                            placeholder="Enter registered VIP legal name" 
                                            class="w-full bg-luxury-slate border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-luxury-gold text-luxury-light"
                                        />
                                    </div>
                                    <div class="grid grid-cols-2 gap-4">
                                        <div class="space-y-1.5">
                                            <label class="text-xs font-bold uppercase tracking-wider text-luxury-muted block">Check-In</label>
                                            <input 
                                                type="date" 
                                                value={bookingCheckIn}
                                                onChange={(e) => setBookingCheckIn(e.target.value)}
                                                class="w-full bg-luxury-slate border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-luxury-gold text-luxury-light font-mono"
                                            />
                                        </div>
                                        <div class="space-y-1.5">
                                            <label class="text-xs font-bold uppercase tracking-wider text-luxury-muted block">Check-Out</label>
                                            <input 
                                                type="date" 
                                                value={bookingCheckOut}
                                                onChange={(e) => setBookingCheckOut(e.target.value)}
                                                class="w-full bg-luxury-slate border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-luxury-gold text-luxury-light font-mono"
                                            />
                                        </div>
                                    </div>
                                </div>

                                {invoiceResult ? (
                                    <div class="p-4 bg-luxury-slate border border-luxury-gold/20 rounded-xl space-y-3">
                                        <div class="text-xs font-bold uppercase tracking-wider text-luxury-gold flex items-center gap-1">
                                            <i data-lucide="receipt" class="w-4 h-4"></i> Calculated System Invoice
                                        </div>
                                        <div class="flex justify-between text-sm">
                                            <span class="text-luxury-muted">Nights Occupied:</span>
                                            <span class="font-bold text-white font-mono">{invoiceResult.days} nights</span>
                                        </div>
                                        <div class="flex justify-between text-sm">
                                            <span class="text-luxury-muted">Rate Multiplier:</span>
                                            <span class="font-bold text-white font-mono">{selectedRoom.price.toLocaleString()} ETB / night</span>
                                        </div>
                                        <div class="border-t border-white/5 pt-2 flex justify-between text-base">
                                            <span class="font-bold text-luxury-gold">Grand Total:</span>
                                            <span class="font-extrabold text-luxury-gold font-mono">{invoiceResult.total.toLocaleString()} ETB</span>
                                        </div>
                                        <button onClick={confirmBooking} class="w-full bg-emerald-500 hover:bg-emerald-400 text-luxury-dark font-extrabold py-3 rounded-lg transition-all text-sm mt-2 flex items-center justify-center gap-2">
                                            <i data-lucide="credit-card" class="w-4 h-4"></i> Confirm Payment & Book
                                        </button>
                                    </div>
                                ) : (
                                    <button onClick={calculateInvoice} class="w-full bg-luxury-gold hover:bg-luxury-gold-light text-luxury-dark font-extrabold py-3.5 rounded-lg transition-all text-sm">
                                        Generate Bill Statement
                                    </button>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Footer */}
                    <footer class="border-t border-white/5 bg-luxury-slate py-8 text-center text-xs text-luxury-muted space-y-2">
                        <p>© 2026 Aye Hotel Luxury Booking Ecosystem. Unity University Academic Project assignment execution framework.</p>
                        <p class="font-mono text-[10px] opacity-40">System-State: ACID Verified Core Stack (React Core + Generative LLM Node)</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
